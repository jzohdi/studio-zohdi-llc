<!doctype html>
<html lang="en" data-status="%sveltekit.status%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<title>%sveltekit.status% | %sveltekit.error.message%</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=League+Spartan:wght@500;600;700;800&display=swap"
		/>
		<meta name="theme-color" content="#f8f8fb" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#090d14" media="(prefers-color-scheme: dark)" />
		<script>
			(() => {
				const storageKey = 'studio-zohdi-theme';

				try {
					const storedTheme = window.localStorage.getItem(storageKey);
					const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches
						? 'dark'
						: 'light';
					const theme =
						storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : systemTheme;

					document.documentElement.dataset.theme = theme;
					document.documentElement.style.colorScheme = theme;
				} catch {
					document.documentElement.dataset.theme = 'light';
					document.documentElement.style.colorScheme = 'light';
				}
			})();
		</script>
		<style>
			:root {
				--background: 0 0% 100%;
				--foreground: 222.2 84% 4.9%;
				--pink: 318 78% 53%;
				--font-display: 'League Spartan', 'Arial Narrow', 'Helvetica Neue', sans-serif;
				--font-body: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
				color-scheme: light;
			}

			[data-theme='dark'] {
				--background: 220 14% 7%;
				--foreground: 0 0% 97%;
				color-scheme: dark;
			}

			html {
				background: hsl(var(--background));
			}

			body {
				margin: 0;
				min-height: 100svh;
				background: hsl(var(--background));
				color: hsl(var(--foreground));
				font-family: var(--font-body);
				text-rendering: optimizeLegibility;
				-webkit-font-smoothing: antialiased;
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}

			a {
				color: inherit;
				text-decoration: none;
			}

			:focus-visible {
				outline: 2px solid hsl(var(--pink));
				outline-offset: 4px;
			}

			.sr-only {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border: 0;
			}

			.shell {
				position: relative;
				isolation: isolate;
				min-height: 100svh;
				overflow: clip;
				background:
					linear-gradient(180deg, hsl(var(--background)), hsl(var(--background))),
					hsl(var(--background));
			}

			.shell::before,
			.shell::after {
				content: '';
				position: absolute;
				pointer-events: none;
			}

			.shell::before {
				top: -12rem;
				left: -8rem;
				width: min(44rem, 80vw);
				aspect-ratio: 1;
				background: radial-gradient(circle, hsl(var(--pink) / 0.18), transparent 68%);
				opacity: 0.95;
			}

			.shell::after {
				right: -10rem;
				bottom: -14rem;
				width: min(40rem, 72vw);
				aspect-ratio: 1;
				background: radial-gradient(circle, hsl(var(--foreground) / 0.08), transparent 70%);
				opacity: 0.72;
			}

			.content {
				position: relative;
				z-index: 1;
				display: grid;
				align-content: center;
				gap: clamp(1.25rem, 3vw, 2rem);
				width: min(100%, 88rem);
				min-height: 100svh;
				margin: 0 auto;
				padding: clamp(1rem, 2.4vw, 2rem);
			}

			.title {
				display: grid;
				gap: 0;
				margin: 0;
				font-family: var(--font-display);
				font-size: clamp(4.8rem, 18vw, 12.5rem);
				font-weight: 800;
				line-height: 0.82;
				letter-spacing: -0.08em;
				text-transform: uppercase;
			}

			.title span:last-child {
				padding-inline-start: clamp(0.9rem, 3.5vw, 2.9rem);
			}

			.action {
				display: inline-flex;
				align-items: center;
				gap: 0.55rem;
				width: fit-content;
				font-family: var(--font-display);
				font-size: 0.72rem;
				font-weight: 500;
				letter-spacing: 0.28em;
				text-transform: uppercase;
				color: hsl(var(--foreground) / 0.7);
				transition:
					color 180ms ease,
					transform 180ms ease;
			}

			.action::after {
				content: '→';
				font-size: 0.9em;
			}

			.action:hover {
				color: hsl(var(--foreground));
				transform: translateX(0.12rem);
			}

			@media (max-width: 900px) {
				.shell::before {
					top: -10rem;
					left: -12rem;
					width: 34rem;
				}

				.shell::after {
					right: -12rem;
					bottom: -10rem;
					width: 30rem;
				}

				.content {
					padding-block: clamp(1.5rem, 12vw, 3rem);
				}

				.title {
					font-size: clamp(3.8rem, 24vw, 6.8rem);
					line-height: 0.86;
				}

				.title span:last-child {
					padding-inline-start: clamp(0.55rem, 4vw, 1.25rem);
				}
			}

			@media (prefers-reduced-motion: reduce) {
				.action {
					transition: none;
				}

				.action:hover {
					transform: none;
				}
			}
		</style>
	</head>
	<body>
		<main class="shell">
			<section class="content" aria-labelledby="error-title" aria-describedby="error-copy">
				<h1 class="title" id="error-title">
					<span>SYSTEM</span>
					<span>ERROR</span>
				</h1>

				<p class="sr-only" id="error-copy">%sveltekit.error.message%</p>

				<a class="action" href="/">Return Home</a>
			</section>
		</main>

		<script>
			(() => {
				const status = Number(document.documentElement.dataset.status || '500');
				const isNotFound = status === 404;
				const title = document.getElementById('error-title');

				document.title = isNotFound ? '404 Not Found | Studio Zohdi' : 'System Error | Studio Zohdi';

				if (title) {
					title.innerHTML = isNotFound
						? '<span>NOT</span><span>FOUND</span>'
						: '<span>SYSTEM</span><span>ERROR</span>';
				}
			})();
		</script>
	</body>
</html>
